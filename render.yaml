services:
  - type: web
    name: belot-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        sync: false  # set this in the Render dashboard to your Netlify URL
    healthCheckPath: /health
